<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Facturen App</title>

<!-- PWA / "Zet op beginscherm" ondersteuning voor iPhone/iPad -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Facturen">
<meta name="theme-color" content="#1d4ed8">
<!-- ?v=2 is een cache-buster: browsers/iOS cachen favicons erg agressief.
     Verhoog dit nummer telkens als de icoon-afbeelding zelf wijzigt, anders
     blijft (ook na een nieuwe deploy) het oude icoontje getoond worden. -->
<link rel="apple-touch-icon" href="icon-192.png?v=2">
<link rel="icon" type="image/png" href="icon-192.png?v=2">

<!-- Google Font voor titels/koppen -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<!-- Alle onderstaande login-/API-scripts staan bewust zonder async/defer,
     zodat ze gegarandeerd geladen zijn voordat app.js (module, laadt pas na
     volledige parse) ze gebruikt. -->

<!-- Google Identity Services: inloggen + toegang tot Google Drive -->
<script src="https://accounts.google.com/gsi/client"></script>

<!-- MSAL.js: inloggen + toegang tot OneDrive (Outlook/Exchange/Microsoft 365).
     Let op: Microsoft's eigen CDN (alcdn.msauth.net) gaf een 503-storing op
     deze versie, daarom via jsDelivr (mirror van hetzelfde npm-pakket). -->
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>

<!-- jsPDF + autotable: voor het genereren van de PDF facturen/offertes -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>Facturen App</h1>
    <p>Professionele facturen en offertes, altijd binnen handbereik — op elk apparaat, veilig bewaard in jouw eigen cloud.</p>

    <div id="login-buttons" class="login-buttons">
      <button id="login-google" class="btn btn-primary btn-block">Inloggen met Google</button>
      <button id="login-microsoft" class="btn btn-secondary btn-block">Inloggen met Microsoft (Outlook/Exchange)</button>
    </div>

    <p id="login-error" class="error-text"></p>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <div class="topbar-brand">
      <img src="logo-graphic.png?v=2" class="topbar-logo" alt="">
      <div class="topbar-title">Facturen App</div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-view="new">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        <span class="tab-label">Nieuw</span>
      </button>
      <button class="tab-btn" data-view="archive">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        <span class="tab-label">Archief</span>
      </button>
      <button class="tab-btn" data-view="clients">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="tab-label">Klanten</span>
      </button>
      <button class="tab-btn" data-view="settings">
        <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="tab-label">Instellingen</span>
      </button>
    </nav>
    <div class="topbar-right">
      <span id="account-label" class="account-label"></span>
      <span id="sync-status" class="sync-status"></span>
      <button id="logout-btn" class="btn btn-ghost btn-sm">Uitloggen</button>
    </div>
  </header>

  <main id="view-root" class="view-root">
    <!-- views worden hier dynamisch gerenderd door app.js -->
  </main>

  <nav class="bottom-nav">
    <button class="tab-btn active" data-view="new">
      <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <span class="tab-label">Nieuw</span>
    </button>
    <button class="tab-btn" data-view="archive">
      <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
      <span class="tab-label">Archief</span>
    </button>
    <button class="tab-btn" data-view="clients">
      <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="tab-label">Klanten</span>
    </button>
    <button class="tab-btn" data-view="settings">
      <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="tab-label">Instellingen</span>
    </button>
  </nav>
</div>

<div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

<script type="module" src="app.js"></script>
</body>
</html>
