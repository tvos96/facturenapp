<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Facturen App</title>

<!-- PWA / "Zet op beginscherm" ondersteuning voor iPhone/iPad -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Facturen">
<meta name="theme-color" content="#1d4ed8">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="stylesheet" href="style.css">

<!-- Google Identity Services: voor inloggen en toegang tot Google Drive.
     Bewust zonder async/defer, zodat het script gegarandeerd geladen is
     voordat app.js (module, laadt na volledige parse) het gebruikt. -->
<script src="https://accounts.google.com/gsi/client"></script>

<!-- jsPDF + autotable: voor het genereren van de PDF facturen/offertes -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <h1>Facturen App</h1>
    <p>Log in met Google om je facturen en offertes te openen. Alles wordt bewaard in een map in jouw eigen Google Drive, zodat je hetzelfde archief ziet op je iPhone, iPad en laptop.</p>
    <button id="login-btn" class="btn btn-primary">Inloggen met Google</button>
    <p id="login-error" class="error-text"></p>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <div class="topbar-title">Facturen App</div>
    <nav class="tabs">
      <button class="tab-btn active" data-view="new">Nieuw</button>
      <button class="tab-btn" data-view="archive">Archief</button>
      <button class="tab-btn" data-view="clients">Klanten</button>
      <button class="tab-btn" data-view="settings">Instellingen</button>
    </nav>
    <div class="topbar-right">
      <span id="sync-status" class="sync-status"></span>
      <button id="logout-btn" class="btn btn-ghost btn-sm">Uitloggen</button>
    </div>
  </header>

  <main id="view-root" class="view-root">
    <!-- views worden hier dynamisch gerenderd door app.js -->
  </main>

  <nav class="bottom-nav">
    <button class="tab-btn active" data-view="new">Nieuw</button>
    <button class="tab-btn" data-view="archive">Archief</button>
    <button class="tab-btn" data-view="clients">Klanten</button>
    <button class="tab-btn" data-view="settings">Instellingen</button>
  </nav>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
